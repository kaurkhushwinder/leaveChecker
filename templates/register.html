{% extends "base.html" %}

{% block content %}
<style>
    .register-container {
        max-width: 450px;
        margin: 80px auto;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 25px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
        box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    .register-container h2 { color: #4CAF50; margin-bottom: 10px; font-size: 2rem; }
    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: rgba(255,255,255,0.7); }
    
    .input-group input {
        width: 100%;
        padding: 12px 15px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(0,0,0,0.2);
        color: white;
        outline: none;
        transition: 0.3s;
    }

    .input-group input:focus { border-color: #4CAF50; box-shadow: 0 0 10px rgba(76, 175, 80, 0.2); }

    .password-wrap {
        position: relative;
    }

    .password-wrap input {
        padding-right: 44px;
    }

    .toggle-password {
        position: absolute;
        top: 52%;
        right: 12px;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.75);
        cursor: pointer;
        width: 28px;
        height: 28px;
    }

    .toggle-password:hover {
        color: #ffffff;
    }

    .btn-register {
        width: 100%; padding: 15px; background: #4CAF50; color: white; border: none;
        border-radius: 12px; font-weight: 700; font-size: 1.1rem; cursor: pointer;
    }
</style>

<div class="register-container">
    <h2>Join Leaf AI</h2>
    <p style="margin-bottom: 30px; opacity: 0.7;">Create an account to start scanning</p>

    {% if message %}
        <div style="background: rgba(255, 87, 87, 0.1); color: #ff5757; padding: 10px; border-radius: 8px; margin-bottom: 20px;">{{ message }}</div>
    {% endif %}

    <form action="/register" method="POST" autocomplete="off">
        
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required autocomplete="new-name">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="example@gmail.com" required autocomplete="off">
        </div>

        <div class="input-group password-wrap">
            <label>Password</label>
            <input id="register-password" type="password" name="password" placeholder="Create a strong password" required autocomplete="new-password">
            <button type="button" class="toggle-password" aria-label="Show password" data-target="register-password">
                <i class="fas fa-eye"></i>
            </button>
        </div>

        <button type="submit" class="btn-register">Create Account</button>
    </form>

    <p style="margin-top: 25px; font-size: 0.9rem; opacity: 0.7;">
        Already have an account? <a href="/login" style="color: #4CAF50; text-decoration: none; font-weight: 600;">Login here</a>
    </p>
</div>

<script>
    document.querySelectorAll('.toggle-password').forEach(function (button) {
        button.addEventListener('click', function () {
            var input = document.getElementById(button.dataset.target);
            var icon = button.querySelector('i');
            var isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            icon.classList.toggle('fa-eye', !isHidden);
            icon.classList.toggle('fa-eye-slash', isHidden);
            button.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        });
    });
</script>
{% endblock %}
