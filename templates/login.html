{% extends "base.html" %}

{% block content %}
<style>
    .auth-card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 25px;
        width: 100%;
        max-width: 400px;
        margin: auto;
        box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        text-align: center;
    }

    .auth-card h2 {
        margin-bottom: 10px;
        font-weight: 600;
        color: #fff;
    }

    .auth-card p {
        color: rgba(255,255,255,0.6);
        margin-bottom: 30px;
        font-size: 0.9rem;
    }

    .input-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .input-group input {
        width: 100%;
        padding: 12px 15px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        color: white;
        outline: none;
        transition: 0.3s;
    }

    .input-group input:focus {
        border-color: #4CAF50;
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 15px rgba(76, 175, 80, 0.2);
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background: #45a049;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
    }

    .auth-footer {
        margin-top: 20px;
        font-size: 0.85rem;
        color: rgba(255,255,255,0.5);
    }

    .auth-footer a {
        color: #4CAF50;
        text-decoration: none;
    }
</style>

<div class="auth-card">
    <h2>🌿 Welcome Back</h2>
    <p>Login to detect plant diseases</p>
    
    <form action="/login" method="POST">
        <div class="input-group">
            <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn-submit">Login</button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a href="/register">Register</a>
    </div>
</div>
{% endblock %}
