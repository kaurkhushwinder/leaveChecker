{% extends "base.html" %}
{% block content %}
<style>
    .upload-container {
        max-width: 600px;
        margin: 50px auto;
        text-align: center;
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 30px;
        border: 2px dashed rgba(76, 175, 80, 0.3);
        transition: 0.3s;
    }
    .upload-container:hover {
        border-color: #4CAF50;
        background: rgba(255, 255, 255, 0.08);
    }
    .preview-img {
        width: 100%;
        max-height: 300px;
        object-fit: contain;
        border-radius: 15px;
        display: none; /* Pehle chhupa rahega */
        margin-bottom: 20px;
    }
    .upload-label {
        cursor: pointer;
        display: block;
        padding: 20px;
    }
    .upload-label i { font-size: 3rem; color: #4CAF50; margin-bottom: 15px; }
    
    #file-input { display: none; }

    .btn-scan {
        background: #4CAF50;
        color: white;
        border: none;
        padding: 15px 40px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        cursor: pointer;
        width: 100%;
        margin-top: 20px;
        display: none; /* Jab tak photo na select ho */
    }
</style>

<div class="upload-container">
    <h2>🌿 Scan Your Plant</h2>
    <p style="color: rgba(255,255,255,0.6);">Clear photo of a single leaf works best</p>

    <form action="/upload" method="POST" enctype="multipart/form-data" id="upload-form">
        <label for="file-input" class="upload-label" id="drop-area">
            <i class="fas fa-cloud-upload-alt"></i>
            <p id="file-name">Click to upload or drag and drop</p>
            <img id="image-preview" class="preview-img">
        </label>
        
        <input type="file" name="leaf_image" id="file-input" accept="image/*" required>
        
        <button type="submit" class="btn-scan" id="scan-btn">Analyze Leaf</button>
    </form>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('image-preview');
    const scanBtn = document.getElementById('scan-btn');
    const labelText = document.querySelector('.upload-label p');
    const icon = document.querySelector('.upload-label i');

    fileInput.onchange = evt => {
        const [file] = fileInput.files;
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            scanBtn.style.display = 'block';
            labelText.innerText = file.name;
            icon.style.display = 'none';
        }
    }
</script>
{% endblock %}
